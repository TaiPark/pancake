services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_DB: pancake
      POSTGRES_USER: pancake
      POSTGRES_PASSWORD: pancake
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pancake -d pancake"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pancake
      MINIO_ROOT_PASSWORD: pancake-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pancake:pancake@postgres:5432/pancake?schema=public}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      HOSTNAME: 0.0.0.0
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-pancake-photos}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-pancake}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-pancake-secret}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  minio-data:
